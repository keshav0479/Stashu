version: 2

updates:
  # Root package.json (husky, prettier, concurrently, lint-staged)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
    open-pull-requests-limit: 5

  # Client workspace
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
    open-pull-requests-limit: 5

  # Server workspace
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      actions:
        patterns: ['*']
        update-types: [minor, patch]
